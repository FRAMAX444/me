<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Francesco Marrocco</title>
  <meta name="description" content="Francesco Marrocco's personal portfolio." />
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #f4f2ee;
    }

    #portfolio-frame {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #f4f2ee;
    }

    .shell-loader,
    .shell-error {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 2rem;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #5f6b7a;
      background: #f4f2ee;
      text-align: center;
    }

    .shell-error strong {
      display: block;
      margin-bottom: 0.5rem;
      color: #1f2328;
    }
  </style>
  <script src="assets/portfolio-host.js" defer></script>
</head>
<body>
  <div class="shell-loader" id="shell-loader">Loading portfolio…</div>
  <iframe id="portfolio-frame" title="Francesco Marrocco portfolio"></iframe>
</body>
</html>
