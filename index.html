<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Francesco Marrocco</title>
  <meta name="description" content="Francesco Marrocco's personal portfolio." />
  <script>
    (() => {
      const supported = ["en", "it", "es", "fr", "de"];
      const storedLanguage = localStorage.getItem("portfolio-language");
      const browserLanguage = (navigator.languages || [navigator.language || "en"])
        .map((value) => String(value).toLowerCase().split("-")[0])
        .find((value) => supported.includes(value));
      const language = supported.includes(storedLanguage) ? storedLanguage : (browserLanguage || "en");

      const storedTheme = localStorage.getItem("portfolio-theme");
      const systemDark = window.matchMedia?.("(prefers-color-scheme: dark)").matches;
      const theme = ["light", "dark"].includes(storedTheme)
        ? storedTheme
        : (systemDark ? "dark" : "light");

      document.documentElement.lang = language;
      document.documentElement.dataset.theme = theme;
    })();
  </script>
  <style>
    :root {
      color-scheme: light;
      --shell-bg: #f4f2ee;
      --shell-text: #5f6b7a;
      --shell-strong: #1f2328;
    }

    :root[data-theme="dark"] {
      color-scheme: dark;
      --shell-bg: #0f141a;
      --shell-text: #aeb8c4;
      --shell-strong: #f3f6fa;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--shell-bg);
    }

    #portfolio-frame {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: var(--shell-bg);
    }

    .shell-loader,
    .shell-error {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 2rem;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--shell-text);
      background: var(--shell-bg);
      text-align: center;
    }

    .shell-error strong {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--shell-strong);
    }
  </style>
  <script src="assets/preferences.js" defer></script>
  <script src="assets/preferences-landing.js?v=20260712-6" defer></script>
  <script src="assets/page-cleanup.js" defer></script>
  <script src="assets/portfolio-host.js" defer></script>
</head>
<body>
  <div class="shell-loader" id="shell-loader">Loading portfolio…</div>
  <iframe id="portfolio-frame" title="Francesco Marrocco portfolio"></iframe>
</body>
</html>
