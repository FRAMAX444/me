<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">European Match Predictor dashboard</title>
  <desc id="desc">Original illustration of a football match prediction dashboard with a pitch, score probabilities, expected goals and model indicators.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071525"/>
      <stop offset="0.52" stop-color="#0d2b43"/>
      <stop offset="1" stop-color="#123d4e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="pitch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f8a62"/>
      <stop offset="1" stop-color="#126647"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#9bd8ea" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <circle cx="1400" cy="105" r="250" fill="#38bdf8" opacity="0.08"/>
  <circle cx="80" cy="820" r="290" fill="#5eead4" opacity="0.07"/>

  <g transform="translate(90 74)">
    <rect width="1420" height="752" rx="42" fill="#f8fafc" filter="url(#shadow)"/>
    <rect width="1420" height="90" rx="42" fill="#0b1f33"/>
    <rect y="48" width="1420" height="42" fill="#0b1f33"/>

    <g transform="translate(40 27)">
      <circle cx="18" cy="18" r="18" fill="url(#accent)"/>
      <path d="M18 7l4 7 8 1-6 6 2 8-8-4-8 4 2-8-6-6 8-1z" fill="#062033"/>
      <text x="52" y="25" font-family="Inter,Arial,sans-serif" font-size="28" font-weight="800" fill="#f8fafc">EUROPEAN MATCH PREDICTOR</text>
    </g>

    <g transform="translate(935 25)" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="700">
      <rect width="86" height="40" rx="20" fill="#17344f"/><text x="43" y="25" fill="#bae6fd" text-anchor="middle">UCL</text>
      <rect x="96" width="86" height="40" rx="20" fill="#17344f"/><text x="139" y="25" fill="#bae6fd" text-anchor="middle">UEL</text>
      <rect x="192" width="86" height="40" rx="20" fill="#17344f"/><text x="235" y="25" fill="#bae6fd" text-anchor="middle">UECL</text>
      <rect x="288" width="122" height="40" rx="20" fill="url(#accent)"/><text x="349" y="25" fill="#062033" text-anchor="middle">BIG FIVE</text>
    </g>

    <g transform="translate(42 126)">
      <rect width="860" height="570" rx="30" fill="#eef4f7"/>
      <text x="34" y="48" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800" fill="#527085">MATCH ANALYSIS</text>

      <g transform="translate(34 76)">
        <rect width="792" height="118" rx="24" fill="#ffffff"/>
        <g font-family="Inter,Arial,sans-serif">
          <text x="26" y="31" font-size="14" font-weight="700" fill="#7b8fa1">CHAMPIONS LEAGUE · MATCHDAY 4</text>
          <text x="26" y="77" font-size="28" font-weight="850" fill="#102a43">Milano FC</text>
          <text x="766" y="77" font-size="28" font-weight="850" fill="#102a43" text-anchor="end">Madrid CF</text>
          <text x="396" y="72" font-size="36" font-weight="900" fill="#0f7490" text-anchor="middle">VS</text>
          <text x="396" y="98" font-size="13" font-weight="700" fill="#78909c" text-anchor="middle">MODEL 4.1 · PRE-MATCH</text>
        </g>
      </g>

      <g transform="translate(34 218)">
        <rect width="465" height="318" rx="24" fill="url(#pitch)"/>
        <g stroke="#d9fff0" stroke-opacity="0.72" fill="none" stroke-width="3">
          <rect x="20" y="20" width="425" height="278" rx="8"/>
          <line x1="232.5" y1="20" x2="232.5" y2="298"/>
          <circle cx="232.5" cy="159" r="49"/>
          <circle cx="232.5" cy="159" r="4" fill="#d9fff0"/>
          <rect x="20" y="91" width="72" height="136"/>
          <rect x="373" y="91" width="72" height="136"/>
          <rect x="20" y="126" width="30" height="66"/>
          <rect x="415" y="126" width="30" height="66"/>
        </g>
        <g fill="#e6fff6" opacity="0.9">
          <circle cx="137" cy="113" r="11"/><circle cx="174" cy="186" r="9"/><circle cx="105" cy="223" r="8"/>
          <circle cx="324" cy="105" r="11"/><circle cx="292" cy="190" r="9"/><circle cx="357" cy="232" r="8"/>
        </g>
        <g fill="#38bdf8">
          <circle cx="214" cy="136" r="7"/><circle cx="253" cy="179" r="7"/><circle cx="226" cy="219" r="6"/>
        </g>
        <path d="M139 113C190 100 256 119 322 105M174 186C230 205 281 200 357 232" fill="none" stroke="#fbbf24" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 10"/>
      </g>

      <g transform="translate(525 218)" font-family="Inter,Arial,sans-serif">
        <rect width="301" height="318" rx="24" fill="#ffffff"/>
        <text x="24" y="37" font-size="16" font-weight="800" fill="#527085">1X2 PROBABILITY</text>

        <text x="24" y="82" font-size="14" font-weight="750" fill="#36566f">HOME</text>
        <rect x="24" y="96" width="252" height="18" rx="9" fill="#e5edf2"/>
        <rect x="24" y="96" width="139" height="18" rx="9" fill="#14b8a6"/>
        <text x="276" y="83" font-size="17" font-weight="850" fill="#0f766e" text-anchor="end">55%</text>

        <text x="24" y="148" font-size="14" font-weight="750" fill="#36566f">DRAW</text>
        <rect x="24" y="162" width="252" height="18" rx="9" fill="#e5edf2"/>
        <rect x="24" y="162" width="68" height="18" rx="9" fill="#f59e0b"/>
        <text x="276" y="149" font-size="17" font-weight="850" fill="#b45309" text-anchor="end">27%</text>

        <text x="24" y="214" font-size="14" font-weight="750" fill="#36566f">AWAY</text>
        <rect x="24" y="228" width="252" height="18" rx="9" fill="#e5edf2"/>
        <rect x="24" y="228" width="45" height="18" rx="9" fill="#38bdf8"/>
        <text x="276" y="215" font-size="17" font-weight="850" fill="#0369a1" text-anchor="end">18%</text>

        <rect x="24" y="268" width="116" height="30" rx="15" fill="#e6fffb"/>
        <text x="82" y="288" font-size="13" font-weight="800" fill="#0f766e" text-anchor="middle">xG 1.82</text>
        <rect x="153" y="268" width="123" height="30" rx="15" fill="#e0f2fe"/>
        <text x="214.5" y="288" font-size="13" font-weight="800" fill="#0369a1" text-anchor="middle">xG 0.94</text>
      </g>
    </g>

    <g transform="translate(930 126)" font-family="Inter,Arial,sans-serif">
      <rect width="448" height="570" rx="30" fill="#0d253a"/>
      <text x="30" y="48" font-size="18" font-weight="800" fill="#b9d9e8">MODEL SIGNALS</text>

      <g transform="translate(30 76)">
        <rect width="388" height="106" rx="22" fill="#15344f"/>
        <text x="22" y="31" font-size="13" font-weight="750" fill="#8fb6ca">MOST LIKELY SCORE</text>
        <text x="22" y="78" font-size="42" font-weight="900" fill="#ffffff">2 — 1</text>
        <rect x="255" y="30" width="108" height="48" rx="24" fill="url(#accent)"/>
        <text x="309" y="60" font-size="16" font-weight="900" fill="#062033" text-anchor="middle">18.6%</text>
      </g>

      <g transform="translate(30 204)">
        <rect width="185" height="126" rx="22" fill="#15344f"/>
        <text x="20" y="31" font-size="13" font-weight="750" fill="#8fb6ca">OVER 2.5</text>
        <text x="20" y="83" font-size="36" font-weight="900" fill="#5eead4">61%</text>
        <path d="M22 104h141" stroke="#2b526d" stroke-width="10" stroke-linecap="round"/>
        <path d="M22 104h86" stroke="#5eead4" stroke-width="10" stroke-linecap="round"/>
      </g>
      <g transform="translate(233 204)">
        <rect width="185" height="126" rx="22" fill="#15344f"/>
        <text x="20" y="31" font-size="13" font-weight="750" fill="#8fb6ca">BTTS</text>
        <text x="20" y="83" font-size="36" font-weight="900" fill="#38bdf8">57%</text>
        <path d="M22 104h141" stroke="#2b526d" stroke-width="10" stroke-linecap="round"/>
        <path d="M22 104h80" stroke="#38bdf8" stroke-width="10" stroke-linecap="round"/>
      </g>

      <g transform="translate(30 352)">
        <rect width="388" height="188" rx="22" fill="#15344f"/>
        <text x="22" y="34" font-size="13" font-weight="750" fill="#8fb6ca">FEATURE BALANCE</text>
        <g font-size="14" font-weight="750" fill="#d7e9f2">
          <text x="22" y="73">Recent form</text><text x="366" y="73" text-anchor="end">78</text>
          <text x="22" y="111">Elo strength</text><text x="366" y="111" text-anchor="end">71</text>
          <text x="22" y="149">Home advantage</text><text x="366" y="149" text-anchor="end">64</text>
        </g>
        <g stroke-linecap="round" stroke-width="9">
          <path d="M132 68h190" stroke="#294f69"/><path d="M132 68h148" stroke="#5eead4"/>
          <path d="M132 106h190" stroke="#294f69"/><path d="M132 106h135" stroke="#38bdf8"/>
          <path d="M132 144h190" stroke="#294f69"/><path d="M132 144h122" stroke="#fbbf24"/>
        </g>
      </g>
    </g>
  </g>
</svg>
