name: Apply projects JSON layout

on:
  push:
    branches:
      - agent/projects-json-current-past

permissions:
  contents: write

jobs:
  patch-projects-page:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Patch the projects page
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import re

          index_path = Path("index.html")
          projects_path = Path("data/projects.json")
          text = index_path.read_text(encoding="utf-8")
          json.loads(projects_path.read_text(encoding="utf-8"))

          css = r'''

    .projects-sections {
      display: grid;
      gap: 1.25rem;
    }

    .project-section {
      display: grid;
      gap: 1rem;
    }

    .project-section-header {
      display: grid;
      gap: 0.35rem;
      padding: 0 0.2rem;
    }

    .project-section-header h2 {
      margin: 0;
      font-size: clamp(1.45rem, 3vw, 2rem);
      letter-spacing: -0.045em;
    }

    .project-section-header p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .project-list {
      display: grid;
      gap: 1rem;
    }

    .project-card {
      display: grid;
      grid-template-columns: minmax(220px, 34%) minmax(0, 1fr);
      border: 1px solid #e1e7ee;
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.07);
      overflow: hidden;
      min-width: 0;
    }

    .project-media {
      position: relative;
      min-height: 240px;
      background: linear-gradient(135deg, #e7eef6, #d5e1ed);
      overflow: hidden;
    }

    .project-media-main {
      width: 100%;
      height: 100%;
      min-height: 240px;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: zoom-in;
      display: block;
    }

    .project-media-main img {
      width: 100%;
      height: 100%;
      min-height: 240px;
      object-fit: cover;
    }

    .project-media-empty {
      min-height: 240px;
      display: grid;
      place-items: center;
      font-size: clamp(2.8rem, 8vw, 5rem);
      font-weight: 800;
      letter-spacing: -0.08em;
      color: #42617e;
    }

    .project-media-type {
      position: absolute;
      left: 0.85rem;
      bottom: 0.85rem;
      z-index: 2;
      padding: 0.42rem 0.7rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.8);
      color: #34495e;
      font-size: 0.78rem;
      font-weight: 800;
      text-transform: capitalize;
      backdrop-filter: blur(8px);
    }

    .project-media-count {
      position: absolute;
      right: 0.85rem;
      bottom: 0.85rem;
      z-index: 2;
      padding: 0.42rem 0.7rem;
      border-radius: 999px;
      background: rgba(31, 35, 40, 0.78);
      color: white;
      font-size: 0.78rem;
      font-weight: 800;
      backdrop-filter: blur(8px);
    }

    .project-card-body {
      min-width: 0;
      padding: 1.25rem;
      display: grid;
      align-content: start;
      gap: 0.9rem;
    }

    .project-card-heading {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
    }

    .project-card-heading h3 {
      margin: 0;
      font-size: clamp(1.3rem, 2.6vw, 1.75rem);
      letter-spacing: -0.045em;
      line-height: 1.08;
    }

    .project-eyebrow {
      color: var(--linkedin);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .project-status {
      flex: 0 0 auto;
      padding: 0.42rem 0.68rem;
      border-radius: 999px;
      background: #eef4fb;
      color: #365b80;
      font-size: 0.78rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .project-description {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      white-space: pre-line;
    }

    .project-meta,
    .project-tags,
    .project-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
      align-items: center;
    }

    .project-meta {
      color: #6b7787;
      font-size: 0.88rem;
    }

    .project-tag {
      padding: 0.42rem 0.66rem;
      border-radius: 999px;
      background: #f5f7fa;
      border: 1px solid #e4e9ef;
      color: #526171;
      font-size: 0.82rem;
      font-weight: 700;
    }

    .project-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.72rem 1rem;
      border-radius: 999px;
      border: 1px solid #dfe6ee;
      background: white;
      color: #445364;
      font-weight: 750;
      transition: 0.18s ease;
    }

    .project-link.primary {
      background: var(--linkedin);
      border-color: var(--linkedin);
      color: white;
    }

    .project-link:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.1);
    }

    @media (max-width: 760px) {
      .project-card {
        grid-template-columns: 1fr;
      }

      .project-media,
      .project-media-main,
      .project-media-main img,
      .project-media-empty {
        min-height: 210px;
      }

      .project-card-heading {
        display: grid;
      }

      .project-status {
        justify-self: start;
      }
    }
'''
          if ".projects-sections {" not in text:
              if "  </style>" not in text:
                  raise RuntimeError("style closing tag not found")
              text = text.replace("  </style>", css + "\n  </style>", 1)

          works_html = r'''    <section id="page-works" class="page">
      <div class="container app-shell">
        <div class="single-col">
          <div class="card card-pad-lg">
            <div class="section-header">
              <div class="badge">My works</div>
              <h1 class="section-title" id="projects-title">Projects</h1>
              <p class="section-subtitle" id="projects-subtitle">
                A curated selection of current and past projects.
              </p>
            </div>
            <p style="margin:1rem 0 0;">
              <a
                class="pill-btn"
                id="github-profile-button"
                href="#"
                target="_blank"
                rel="noreferrer"
              >
                Open GitHub profile
              </a>
            </p>
          </div>

          <div id="projects-sections" class="projects-sections">
            <div class="loader">Loading projects…</div>
          </div>
        </div>
      </div>
    </section>'''
          works_pattern = re.compile(r'    <section id="page-works" class="page">.*?    </section>(?=\n  </main>)', re.S)
          text, count = works_pattern.subn(works_html, text, count=1)
          if count != 1:
              raise RuntimeError("projects HTML section was not replaced")

          old_vars = "    let PUBLICATIONS_DATA = null;\n    let GITHUB_USERNAME = null;"
          new_vars = "    let PUBLICATIONS_DATA = null;\n    let PROJECTS_DATA = null;\n    let GITHUB_USERNAME = null;"
          if old_vars not in text:
              raise RuntimeError("data variable marker not found")
          text = text.replace(old_vars, new_vars, 1)

          projects_js = r'''    function projectInitials(title) {
      return String(title || "P")
        .split(/[\s_-]+/)
        .filter(Boolean)
        .slice(0, 2)
        .map((part) => part[0])
        .join("")
        .toUpperCase();
    }

    function normalizeProjectMedia(project = {}) {
      const source = Array.isArray(project.media) ? project.media : [];
      const fallback = [];

      if (isNonEmptyString(project.image)) {
        fallback.push({
          type: "image",
          src: project.image,
          alt: project.imageAlt || project.title || "Project image",
          caption: project.imageCaption || ""
        });
      }

      if (Array.isArray(project.images)) {
        project.images.forEach((src) => {
          if (isNonEmptyString(src)) fallback.push({ type: "image", src, alt: project.title || "Project image" });
        });
      }

      return [...source, ...fallback]
        .map((item) => {
          if (isNonEmptyString(item)) return { type: "image", src: item, alt: project.title || "Project image" };
          if (!item || !isNonEmptyString(item.src)) return null;
          return {
            type: item.type || "image",
            src: item.src,
            alt: item.alt || project.title || "Project media",
            caption: item.caption || ""
          };
        })
        .filter(Boolean);
    }

    function normalizeProjectLinks(project = {}) {
      const links = [];

      if (isNonEmptyString(project.repoUrl)) {
        links.push({
          label: project.repoLabel || "Repository",
          url: project.repoUrl,
          primary: true
        });
      }

      if (isNonEmptyString(project.liveUrl)) {
        links.push({
          label: project.liveLabel || "Live demo",
          url: project.liveUrl,
          primary: !links.length
        });
      }

      const extra = Array.isArray(project.links) ? project.links : [];
      extra.forEach((item) => {
        if (isNonEmptyString(item)) {
          links.push({ label: item, url: item, primary: false });
          return;
        }
        if (!item || !isNonEmptyString(item.url || item.href)) return;
        links.push({
          label: item.label || item.name || item.title || "Open link",
          url: item.url || item.href,
          primary: Boolean(item.primary)
        });
      });

      return links;
    }

    function renderProjectMedia(project) {
      const media = normalizeProjectMedia(project);
      if (!media.length) {
        return `<div class="project-media"><div class="project-media-empty">${escapeHtml(projectInitials(project.title))}</div></div>`;
      }

      const first = media[0];
      const images = media.map((item) => item.src);
      return `
        <div class="project-media">
          <button
            class="project-media-main"
            type="button"
            data-project-gallery
            data-images="${escapeHtml(JSON.stringify(images))}"
            data-title="${escapeHtml(project.title || "Project gallery")}"
            aria-label="Open ${escapeHtml(project.title || "project")} gallery"
          >
            <img src="${escapeHtml(first.src)}" alt="${escapeHtml(first.alt)}" loading="lazy" />
          </button>
          <span class="project-media-type">${escapeHtml(first.type || "image")}</span>
          ${media.length > 1 ? `<span class="project-media-count">1 / ${media.length}</span>` : ""}
        </div>
      `;
    }

    function renderProjectCard(project) {
      const tags = Array.isArray(project.tags) ? project.tags.filter(isNonEmptyString) : [];
      const links = normalizeProjectLinks(project);
      const meta = [project.year, project.role, project.organization].filter(Boolean);

      return `
        <article class="project-card">
          ${renderProjectMedia(project)}
          <div class="project-card-body">
            ${project.eyebrow ? `<div class="project-eyebrow">${escapeHtml(project.eyebrow)}</div>` : ""}
            <div class="project-card-heading">
              <h3>${escapeHtml(project.title || "Untitled project")}</h3>
              ${project.status ? `<span class="project-status">${escapeHtml(project.status)}</span>` : ""}
            </div>
            ${project.description ? `<p class="project-description">${escapeHtml(project.description)}</p>` : ""}
            ${meta.length ? `<div class="project-meta">${meta.map((item) => `<span>${escapeHtml(item)}</span>`).join("<span>•</span>")}</div>` : ""}
            ${tags.length ? `<div class="project-tags">${tags.map((tag) => `<span class="project-tag">${escapeHtml(tag)}</span>`).join("")}</div>` : ""}
            ${links.length ? `<div class="project-links">${links.map((link, index) => `<a class="project-link ${(link.primary || index === 0) ? "primary" : ""}" href="${escapeHtml(link.url)}" target="_blank" rel="noreferrer">${escapeHtml(link.label)}</a>`).join("")}</div>` : ""}
          </div>
        </article>
      `;
    }

    function renderProjects() {
      const container = document.getElementById("projects-sections");
      const settings = PROJECTS_DATA?.settings || {};
      const sections = Array.isArray(PROJECTS_DATA?.sections) ? [...PROJECTS_DATA.sections] : [];
      const projects = Array.isArray(PROJECTS_DATA?.projects)
        ? PROJECTS_DATA.projects.filter((project) => project && project.enabled !== false)
        : [];

      document.getElementById("projects-title").textContent = settings.title || "Projects";
      document.getElementById("projects-subtitle").textContent = settings.subtitle || "A curated selection of current and past projects.";

      sections.sort((a, b) => Number(a.order || 999) - Number(b.order || 999));

      const knownSections = new Set(sections.map((section) => section.id));
      projects.forEach((project) => {
        const sectionId = project.section || "past";
        if (!knownSections.has(sectionId)) {
          sections.push({ id: sectionId, title: sectionId.replace(/[-_]/g, " "), subtitle: "", order: 999 });
          knownSections.add(sectionId);
        }
      });

      const html = sections
        .map((section) => {
          const sectionProjects = projects
            .filter((project) => (project.section || "past") === section.id)
            .sort((a, b) => Number(a.order || 999) - Number(b.order || 999));

          if (!sectionProjects.length) return "";

          return `
            <section class="project-section">
              <header class="project-section-header">
                <h2>${escapeHtml(section.title || section.id)}</h2>
                ${section.subtitle ? `<p>${escapeHtml(section.subtitle)}</p>` : ""}
              </header>
              <div class="project-list">
                ${sectionProjects.map(renderProjectCard).join("")}
              </div>
            </section>
          `;
        })
        .join("");

      container.innerHTML = html || `<div class="notice">No projects configured in <code>data/projects.json</code>.</div>`;

      container.querySelectorAll("[data-project-gallery]").forEach((button) => {
        button.addEventListener("click", () => {
          try {
            const images = JSON.parse(button.dataset.images || "[]");
            openLightbox(images, 0, button.dataset.title || "Project gallery");
          } catch (error) {
            console.warn("Invalid project gallery", error);
          }
        });
      });

      container.querySelectorAll(".project-media-main img").forEach((image) => {
        image.addEventListener("error", () => {
          const media = image.closest(".project-media");
          if (!media) return;
          media.innerHTML = `<div class="project-media-empty">${escapeHtml(projectInitials(image.alt))}</div>`;
        }, { once: true });
      });
    }

    async function fetchJson(path, label) {'''

          functions_pattern = re.compile(r'    function repoCard\(repo, label\) \{.*?    async function fetchJson\(path, label\) \{', re.S)
          text, count = functions_pattern.subn(projects_js, text, count=1)
          if count != 1:
              raise RuntimeError("legacy repository renderer was not replaced")

          old_fetch = '''        const [siteConfig, aboutData, publicationsData] = await Promise.all([
          fetchJson("data/site-config.json", "site-config"),
          fetchJson("data/about.json", "about"),
          fetchJson("data/publications.json", "publications")
        ]);'''
          new_fetch = '''        const [siteConfig, aboutData, publicationsData, projectsData] = await Promise.all([
          fetchJson("data/site-config.json", "site-config"),
          fetchJson("data/about.json", "about"),
          fetchJson("data/publications.json", "publications"),
          fetchJson("data/projects.json", "projects")
        ]);'''
          if old_fetch not in text:
              raise RuntimeError("bootstrap fetch block not found")
          text = text.replace(old_fetch, new_fetch, 1)

          old_assign = '''        SITE_CONFIG = siteConfig;
        ABOUT_DATA = aboutData;
        PUBLICATIONS_DATA = publicationsData;'''
          new_assign = '''        SITE_CONFIG = siteConfig;
        ABOUT_DATA = aboutData;
        PUBLICATIONS_DATA = publicationsData;
        PROJECTS_DATA = projectsData;'''
          if old_assign not in text:
              raise RuntimeError("bootstrap assignment block not found")
          text = text.replace(old_assign, new_assign, 1)

          old_render = '''        renderConfigDrivenUI();
        await loadRepos();
        renderAbout();
        renderPublications();
        initLightbox();'''
          new_render = '''        renderConfigDrivenUI();
        renderAbout();
        renderPublications();
        renderProjects();
        initLightbox();'''
          if old_render not in text:
              raise RuntimeError("bootstrap render block not found")
          text = text.replace(old_render, new_render, 1)

          required = [
              'fetchJson("data/projects.json", "projects")',
              'function renderProjects()',
              'id="projects-sections"',
              'Currently working on'
          ]
          if required[-1] not in projects_path.read_text(encoding="utf-8"):
              raise RuntimeError("current projects section missing from JSON")
          for marker in required[:-1]:
              if marker not in text:
                  raise RuntimeError(f"missing marker after patch: {marker}")

          index_path.write_text(text, encoding="utf-8")
          PY

      - name: Commit generated page
        run: |
          rm -f .github/workflows/apply-projects-json.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/apply-projects-json.yml
          git commit -m "Render projects from JSON [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}
